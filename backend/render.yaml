# Render.com blueprint for the Smart City backend.
# In Render: New + > Blueprint, point at this repo, set root directory to `backend`.
# Then add the DATABASE_URL env var (from your Postgres provider) in the dashboard.
services:
  - type: web
    name: smart-city-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # set this in the dashboard (from Supabase/Neon/Render DB)
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        sync: false        # set to your admin panel URL, e.g. https://your-admin.vercel.app
